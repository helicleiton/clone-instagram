<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Instagram &bull; Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --azul-facebook: #0095f6;
      --azul-claro: #b3dbff;
      --cinza-claro: #fafafa;
      --cinza-medio: #dbdbdb;
      --cinza-escuro: #8e8e8e;
      --preto-texto: #262626;
      --link-azul: #00376b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--cinza-claro);
      color: var(--preto-texto);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .wrapper {
      width: 100%;
      max-width: 350px;
      margin-bottom: 20px;
    }

    .box {
      background: #fff;
      border: 1px solid var(--cinza-medio);
      padding: 40px 30px 20px;
      text-align: center;
    }

    .logo {
      width: 175px;
      margin-bottom: 30px;
    }

    .input-group {
      position: relative;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 10px;
      border: 1px solid var(--cinza-medio);
      border-radius: 3px;
      font-size: 12px;
      background: var(--cinza-claro);
    }

    input:focus {
      outline: 2px solid #9ecfff;
      outline-offset: 1px;
      border-color: var(--cinza-escuro);
    }

    .btn-show {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      display: none;
    }

    /* Botao e spinner */
    .btn-login {
      width: 100%;
      height: 36px;
      margin-top: 10px;
      background: var(--azul-claro);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: not-allowed;
      transition: background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .btn-login.ativo {
      background: var(--azul-facebook);
      cursor: pointer;
    }

    .btn-login:disabled {
      background: var(--azul-claro);
      cursor: not-allowed;
      opacity: 1;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Estado de carregamento */
    .btn-login.loading .btn-text {
      display: none;
    }

    .btn-login.loading .spinner {
      display: block;
    }

    .btn-login.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .ou {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: var(--cinza-escuro);
      font-size: 13px;
      font-weight: 500;
    }

    .ou::before, .ou::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--cinza-medio);
    }

    .ou::before { margin-right: 15px; }
    .ou::after { margin-left: 15px; }

    .entrar-facebook {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #385185;
      font-weight: 600;
      text-decoration: none;
      font-size: 14px;
    }

    .esqueceu-senha {
      display: block;
      margin-top: 25px;
      color: var(--link-azul);
      font-size: 12px;
      text-decoration: none;
    }

    .box-register {
      background: #fff;
      border: 1px solid var(--cinza-medio);
      padding: 20px;
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }

    .box-register a {
      color: var(--azul-facebook);
      text-decoration: none;
      font-weight: 600;
    }

    .rodape {
      margin-top: auto;
      padding: 20px 0;
      font-size: 12px;
      color: var(--cinza-escuro);
      text-align: center;
    }

    @media (max-width: 450px) {
      body { background: #fff; }
      .box, .box-register { border: none; }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="box">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram" class="logo">

      <form id="login-form">
        <div class="input-group">
          <input type="text" id="username" name="username" placeholder="Telefone, nome de usu&#225;rio ou email" autocomplete="username" autocapitalize="off" spellcheck="false" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" name="password" placeholder="Senha" autocomplete="current-password" required>
          <button type="button" id="togglePassword" class="btn-show">Mostrar</button>
        </div>

        <button type="submit" id="btn" class="btn-login" disabled>
          <span class="btn-text">Entrar</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="ou">OU</div>

      <a class="entrar-facebook" href="https://www.instagram.com/accounts/login/">
        <svg width="16" height="16" fill="#385185" viewBox="0 0 16 16">
          <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05S0 3.603 0 8.049C0 12.006 2.918 15.26 6.75 15.97v-5.61H4.72V8.05h2.03V6.276c0-2.017 1.196-3.13 3.022-3.13.875 0 1.79.156 1.79.156v1.98h-1.008c-.996 0-1.304.62-1.304 1.257v1.51h2.22l-.354 2.31H9.75v5.61c3.832-.71 6.75-3.963 6.75-7.92z"/>
        </svg>
        Entrar com o Facebook
      </a>

      <a class="esqueceu-senha" href="https://www.instagram.com/accounts/password/reset/">Esqueceu a senha?</a>
    </div>

    <div class="box-register">
      <p>N&#227;o tem uma conta? <a href="https://www.instagram.com/accounts/emailsignup/">Cadastre-se</a></p>
    </div>
  </div>

  <div class="rodape">
    <p>from Meta</p>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const form = document.getElementById('login-form');
    const userInp = document.getElementById('username');
    const passInp = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePassword');

    function verifica() {
      const preenchidos = userInp.value.trim().length >= 1 && passInp.value.trim().length >= 6;
      btn.disabled = !preenchidos;
      btn.classList.toggle('ativo', preenchidos);
      toggleBtn.style.display = passInp.value.length > 0 ? 'inline' : 'none';
    }

    toggleBtn.addEventListener('click', () => {
      const isPassword = passInp.type === 'password';
      passInp.type = isPassword ? 'text' : 'password';
      toggleBtn.textContent = isPassword ? 'Ocultar' : 'Mostrar';
    });

    userInp.addEventListener('input', verifica);
    passInp.addEventListener('input', verifica);

    form.addEventListener('submit', e => {
      e.preventDefault();

      // Impede clique duplo ou se o botao estiver inativo.
      if (btn.disabled || btn.classList.contains('loading')) return;

      // Ativa estado de carregamento.
      btn.classList.add('loading');
      btn.disabled = true;

      // Simula uma espera de rede de 2 segundos.
      setTimeout(() => {
        btn.classList.remove('loading');
        verifica();
        alert(`Login simulado com sucesso!\nUsuario: ${userInp.value}`);
      }, 2000);
    });
  </script>
</body>
</html>
